# Default system-wide settings.
# Create any *.local file in this directory to override these values.

# Access log location(s) (nginx defaults).
# You can provide multiple directories separated by whitespace
# (space, tab, or newline).
# Example: LOG_DIR=/var/log/nginx /var/www/my-site-logs
LOG_DIR=/var/log/nginx
ACCESS_LOG_BASENAME=access.log
# Daily scan reads yesterday's rotated log: ${ACCESS_LOG_BASENAME}.1

# DNS reverse lookup timeout in seconds.
DNS_TIMEOUT_SECONDS=3

# Host scan actions (on|off).
HOST_SCAN_LOG=on
HOST_SCAN_BAN=on

# Agent scan actions (on|off).
AGENT_SCAN_LOG=on
AGENT_SCAN_BAN=on

# URL Pattern scan actions (on|off).
URLPATTERN_SCAN_LOG=on
URLPATTERN_SCAN_BAN=on

# Subnet promotion actions (on|off).
SUBNET_PROMOTION_LOG=on
SUBNET_PROMOTION=on

# Promote subnet when unique IPs in /24 are greater than threshold.
SUBNET_THRESHOLD=10

# Pipe-delimited detector and allowlist values.
# Set any of these in a *.local file to fully override defaults.
BAD_HOSTNAMES=googleusercontent|azure|cnsat|your-server|contaboserver|myconvento|digimobil|opoint|acedatecenter/lolocross|colocationamerica|amazonaws|hwclouds|digitalocean|semantic-visions|viettel|ic2net
GOOD_HOSTNAMES=127.0.0.1|googlebot|applebot|search.msn.com|linkedin|fbsv|twttr
BAD_AGENTS=bot|crawl|scrape
GOOD_AGENTS=google|apple|bin|linkedin|facebook|twitter
BAD_URLPATTERNS=sitemap
GOOD_URLPATTERNS=
